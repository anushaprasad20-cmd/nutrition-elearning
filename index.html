nd: #c8cace; box-shadow: none; cursor: not-allowed; }\n  .btn:focus-visible { outline: 3px solid var(--green); outline-offset: 3px; }\n  .btn .arrow { transition: transform 200ms var(--ease); }\n  .btn:hover:not(:disabled) .arrow { transform: translateX(3px); }\n  #continueBtn { display: none; }\n\n  @media (max-width: 760px) {\n    .board { grid-template-columns: 1fr; }\n    .pool { order: -1; min-height: 0; }\n    .zone { min-height: 140px; }\n  }\n  @media (max-width: 540px) {\n    .module .sub, .module .sep { display: none; }\n    .progress .count { display: none; }\n    .hint { display: none; }\n    .btn { flex: 1; justify-content: center; }\n  }\n<\/style>\n<\/head>\n<body>\n  <header class=\"topbar\">\n    <div class=\"module\">\n      <span class=\"mark\" aria-hidden=\"true\"><\/span>\n      <span class=\"title\">Nutrition Labels<\/span>\n      <span class=\"sep\">·<\/span>\n      <span class=\"sub\">Module 6 — Sort the claims<\/span>\n    <\/div>\n    <div class=\"progress\" aria-label=\"Sorting progress\">\n      <span class=\"count\" id=\"countText\"><b id=\"sorted\">0<\/b> of 6 sorted<\/span>\n      <div class=\"pips\" id=\"pips\" aria-hidden=\"true\"><\/div>\n    <\/div>\n  <\/header>\n\n  <main>\n    <div class=\"wrap\" data-screen-label=\"Sorting Activity\">\n      <div class=\"head\">\n        <h1>Regulated, or just marketing?<\/h1>\n        <p>Drag each claim into the column where it belongs.<\/p>\n      <\/div>\n\n      <div class=\"board\">\n        <!-- Left: regulated -->\n        <div class=\"col reg\">\n          <div class=\"col-head\">\n            <span class=\"ct\"><span class=\"dot\"><\/span> FDA-Regulated<\/span>\n            <span class=\"cn\" data-counter><\/span>\n          <\/div>\n          <div class=\"zone\" data-zone=\"reg\" aria-label=\"FDA-Regulated drop column\">\n            <span class=\"placeholder\">Drop legally defined claims here<\/span>\n          <\/div>\n        <\/div>\n\n        <!-- Center: pool -->\n        <div class=\"col\">\n          <div class=\"col-head\">\n            <span class=\"ct\" style=\"color:var(--ink-soft)\">Claims to sort<\/span>\n            <span class=\"cn\" id=\"poolCount\"><\/span>\n          <\/div>\n          <div class=\"pool has-cards\" id=\"pool\" aria-label=\"Claims to sort\">\n            <span class=\"placeholder\">All claims sorted — hit Submit below.<\/span>\n\n            <div class=\"claim\" data-answer=\"reg\" data-exp=\"Legally defined — 3 g of fat or less per serving.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"Low Fat\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n\n            <div class=\"claim\" data-answer=\"reg\" data-exp=\"Legally defined — &quot;good source&quot; means 10–19% of the Daily Value per serving.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"Good source of fiber\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n\n            <div class=\"claim\" data-answer=\"unreg\" data-exp=\"No legal standard — &quot;real&quot; isn't defined, so it can appear on almost anything.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"Made with real ingredients\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n\n            <div class=\"claim\" data-answer=\"unreg\" data-exp=\"No legal definition — a feel-good phrase, not a measurable claim.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"Guilt-free snacking\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n\n            <div class=\"claim\" data-answer=\"reg\" data-exp=\"Legally defined — &quot;high in&quot; means 20% of the Daily Value or more per serving.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"High in Vitamin C\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n\n            <div class=\"claim\" data-answer=\"unreg\" data-exp=\"No legal standard — &quot;clean&quot; is marketing language, not an FDA term.\">\n              <div class=\"crow\"><span class=\"grip\" aria-hidden=\"true\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/span><span class=\"label\">\"Clean eating approved\"<\/span><span class=\"rmark\" aria-hidden=\"true\"><\/span><\/div>\n              <div class=\"explain\"><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- Right: unregulated -->\n        <div class=\"col unreg\">\n          <div class=\"col-head\">\n            <span class=\"ct\"><span class=\"dot\"><\/span> Unregulated Marketing<\/span>\n            <span class=\"cn\" data-counter><\/span>\n          <\/div>\n          <div class=\"zone\" data-zone=\"unreg\" aria-label=\"Unregulated Marketing Language drop column\">\n            <span class=\"placeholder\">Drop vague marketing phrases here<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/main>\n\n  <footer class=\"footer\">\n    <div class=\"footer-inner\">\n      <span class=\"hint\" id=\"hint\">Sort all 6 claims to enable Submit.<\/span>\n      <div style=\"display:flex; gap:12px; align-items:center; margin-left:auto;\">\n        <button class=\"btn\" id=\"submitBtn\" type=\"button\" disabled>Submit <span class=\"arrow\" aria-hidden=\"true\">→<\/span><\/button>\n        <button class=\"btn\" id=\"continueBtn\" type=\"button\">Continue <span class=\"arrow\" aria-hidden=\"true\">→<\/span><\/button>\n      <\/div>\n    <\/div>\n  <\/footer>\n\n<script>\n  const pool = document.getElementById(\"pool\");\n  const zones = [...document.querySelectorAll(\".zone\")];\n  const claims = [...document.querySelectorAll(\".claim\")];\n  const submitBtn = document.getElementById(\"submitBtn\");\n  const continueBtn = document.getElementById(\"continueBtn\");\n  const sortedEl = document.getElementById(\"sorted\");\n  const poolCount = document.getElementById(\"poolCount\");\n  const hint = document.getElementById(\"hint\");\n  const pipsWrap = document.getElementById(\"pips\");\n\n  const TOTAL = claims.length;\n  let submitted = false;\n\n  // pips\n  for (let i = 0; i < TOTAL; i++) {\n    const pip = document.createElement(\"span\");\n    pip.className = \"pip\";\n    pipsWrap.appendChild(pip);\n  }\n  const pips = pipsWrap.children;\n\n  // pre-fill explanation text from data-exp\n  claims.forEach(c => { c.querySelector(\".explain\").textContent = c.dataset.exp; });\n\n  /* ── pointer drag ── */\n  let drag = null;\n\n  function onPointerDown(e) {\n    if (submitted) return;\n    const card = e.currentTarget;\n    e.preventDefault();\n    const rect = card.getBoundingClientRect();\n    const ghost = card.cloneNode(true);\n    ghost.classList.add(\"ghost\");\n    ghost.style.width = rect.width + \"px\";\n    document.body.appendChild(ghost);\n    card.classList.add(\"source-hidden\");\n\n    drag = { card, ghost, offX: e.clientX - rect.left, offY: e.clientY - rect.top };\n    moveGhost(e.clientX, e.clientY);\n\n    window.addEventListener(\"pointermove\", onPointerMove);\n    window.addEventListener(\"pointerup\", onPointerUp, { once: true });\n  }\n\n  function moveGhost(x, y) {\n    drag.ghost.style.transform = \"translate(\" + (x - drag.offX) + \"px,\" + (y - drag.offY) + \"px) rotate(-1.5deg)\";\n  }\n\n  function zoneUnder(x, y) {\n    drag.ghost.style.visibility = \"hidden\";\n    const el = document.elementFromPoint(x, y);\n    drag.ghost.style.visibility = \"\";\n    if (!el) return null;\n    return el.closest(\".zone, .pool\");\n  }\n\n  function onPointerMove(e) {\n    if (!drag) return;\n    moveGhost(e.clientX, e.clientY);\n    const target = zoneUnder(e.clientX, e.clientY);\n    zones.forEach(z => z.classList.toggle(\"over\", z === target));\n  }\n\n  function onPointerUp(e) {\n    if (!drag) return;\n    window.removeEventListener(\"pointermove\", onPointerMove);\n    const target = zoneUnder(e.clientX, e.clientY) || drag.card.parentElement;\n    drag.ghost.remove();\n    drag.card.classList.remove(\"source-hidden\");\n    if (target) target.appendChild(drag.card);\n    zones.forEach(z => z.classList.remove(\"over\"));\n    drag = null;\n    refresh();\n  }\n\n  claims.forEach(c => c.addEventListener(\"pointerdown\", onPointerDown));\n\n  /* ── state ── */\n  function refresh() {\n    // counts per container\n    document.querySelectorAll(\".col\").forEach(col => {\n      const zone = col.querySelector(\".zone\");\n      if (!zone) return;\n      const n = zone.querySelectorAll(\".claim\").length;\n      zone.classList.toggle(\"has-cards\", n > 0);\n      const counter = col.querySelector(\"[data-counter]\");\n      if (counter) counter.textContent = n ? n + (n === 1 ? \" claim\" : \" claims\") : \"\";\n    });\n\n    const remaining = pool.querySelectorAll(\".claim\").length;\n    pool.classList.toggle(\"empty-pool\", remaining === 0);\n    pool.classList.toggle(\"has-cards\", remaining > 0);\n    poolCount.textContent = remaining ? remaining + \" left\" : \"\";\n\n    const sorted = TOTAL - remaining;\n    sortedEl.textContent = sorted;\n    for (let i = 0; i < TOTAL; i++) pips[i].classList.toggle(\"on\", i < sorted);\n\n    submitBtn.disabled = remaining !== 0;\n    if (!submitted) hint.textContent = remaining === 0 ? \"Ready — review your sort, then Submit.\" : \"Sort all 6 claims to enable Submit.\";\n  }\n\n  /* ── submit / grade ── */\n  submitBtn.addEventListener(\"click\", () => {\n    if (submitted || submitBtn.disabled) return;\n    submitted = true;\n\n    let correct = 0;\n    zones.forEach(zone => {\n      const zoneKey = zone.dataset.zone;\n      zone.querySelectorAll(\".claim\").forEach(card => {\n        const right = card.dataset.answer === zoneKey;\n        card.classList.add(right ? \"correct\" : \"incorrect\");\n        card.querySelector(\".rmark\").textContent = right ? \"✓\" : \"✕\";\n        if (right) {\n          correct++;\n        } else {\n          const correctCol = card.dataset.answer === \"reg\" ? \"FDA-Regulated\" : \"Unregulated Marketing\";\n          card.querySelector(\".explain\").textContent = \"Belongs under \" + correctCol + \". \" + card.dataset.exp;\n        }\n        card.style.touchAction = \"auto\";\n      });\n    });\n\n    sortedEl.parentElement.innerHTML = \"<b>\" + correct + \"<\/b> / \" + TOTAL + \" correct\";\n    submitBtn.style.display = \"none\";\n    continueBtn.style.display = \"inline-flex\";\n    hint.textContent = correct === TOTAL ? \"Perfect sort — every claim placed correctly.\" : \"Check the cards marked in red and read why.\";\n  });\n\n  refresh();\n<\/script>\n\n<script>\n(function () {\n  // Wire this screen's advance control to the parent router.\n  var SEL = \"#continueBtn\";\n  document.addEventListener(\n    \"click\",\n    function (e) {\n      var t = e.target.closest && e.target.closest(SEL);\n      if (t && !t.disabled) {\n        parent.postMessage({ type: \"advance\" }, \"*\");\n      }\n    },\n    true\n  );\n})();\n\n<\/script>\n<\/body>\n<\/html>\n","posttest":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Post-Test · Nutrition Labels<\/title>\n<style>\n  :root {\n    --font-display: \"SF Pro Display\", -apple-system, BlinkMacSystemFont, \"Inter\", \"Helvetica Neue\", sans-serif;\n    --font-text:    \"SF Pro Text\", -apple-system, BlinkMacSystemFont, \"Inter\", \"Helvetica Neue\", sans-serif;\n\n    --ink:        #1d1d1f;\n    --ink-soft:   #6e6e73;\n    --ink-muted:  #86868b;\n    --divider:    #d2d2d7;\n    --mid:        #f5f5f7;\n\n    --green:        #61BB46;\n    --green-btn:    #2f8f3e;\n    --green-btn-hi: #36a447;\n    --green-soft:   rgba(97, 187, 70, 0.10);\n    --green-line:   rgba(97, 187, 70, 0.45);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n\n  body {\n    font-family: var(--font-text);\n    color: var(--ink);\n    background: #ffffff;\n    min-height: 100vh;\n    min-height: 100dvh;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* ── Top bar ── */\n  .topbar {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 22px clamp(20px, 5vw, 48px);\n    border-bottom: 1px solid var(--mid);\n  }\n  .mark {\n    width: 22px; height: 22px;\n    border-radius: 6px;\n    background: var(--green);\n    flex: none;\n    position: relative;\n  }\n  .mark::after {\n    content: \"\";\n    position: absolute;\n    inset: 6px 6px auto 6px;\n    height: 3px;\n    border-radius: 2px;\n    background: rgba(255,255,255,0.9);\n    box-shadow: 0 5px 0 rgba(255,255,255,0.7), 0 10px 0 rgba(255,255,255,0.5);\n  }\n  .brand {\n    font-family: var(--font-display);\n    font-size: 15px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n  }\n  .tag {\n    margin-left: auto;\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n  }\n\n  /* ── Main ── */\n  main {\n    flex: 1;\n    display: flex;\n    justify-content: center;\n    padding: clamp(28px, 5vw, 56px) clamp(20px, 5vw, 48px) clamp(120px, 14vw, 140px);\n  }\n  .quiz {\n    width: 100%;\n    max-width: 680px;\n  }\n\n  /* ── Progress ── */\n  .progress-head {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    margin-bottom: 12px;\n  }\n  .progress-label {\n    font-family: var(--font-display);\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--green-btn);\n    letter-spacing: 0.01em;\n  }\n  .progress-pct {\n    font-size: 13px;\n    color: var(--ink-muted);\n  }\n  .progress-track {\n    height: 6px;\n    background: var(--mid);\n    border-radius: 100px;\n    overflow: hidden;\n  }\n  .progress-fill {\n    height: 100%;\n    width: 0%;\n    background: var(--green);\n    border-radius: 100px;\n    transition: width 500ms var(--ease);\n  }\n\n  /* ── Question ── */\n  .question {\n    margin: clamp(28px, 4vw, 40px) 0 clamp(20px, 3vw, 28px);\n    font-family: var(--font-display);\n    font-size: clamp(22px, 3.2vw, 30px);\n    font-weight: 600;\n    letter-spacing: -0.02em;\n    line-height: 1.25;\n    color: var(--ink);\n    text-wrap: pretty;\n  }\n\n  /* ── Answer cards ── */\n  .options {\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n  }\n  .opt {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    width: 100%;\n    text-align: left;\n    background: #fff;\n    border: 1.5px solid var(--divider);\n    border-radius: 14px;\n    padding: 18px 20px;\n    cursor: pointer;\n    font-family: var(--font-text);\n    transition: border-color 200ms var(--ease), background 200ms var(--ease),\n                box-shadow 200ms var(--ease), transform 120ms var(--ease);\n  }\n  .opt:hover { border-color: var(--green-line); }\n  .opt:active { transform: scale(0.995); }\n  .opt:focus-visible { outline: 3px solid var(--green); outline-offset: 2px; }\n\n  .opt .letter {\n    flex: none;\n    width: 34px; height: 34px;\n    border-radius: 50%;\n    border: 1.5px solid var(--divider);\n    background: var(--mid);\n    color: var(--ink-soft);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-display);\n    font-size: 15px; font-weight: 600;\n    transition: all 200ms var(--ease);\n  }\n  .opt .text {\n    font-size: clamp(15px, 1.8vw, 17px);\n    line-height: 1.45;\n    color: var(--ink);\n  }\n\n  .opt.selected {\n    border-color: var(--green);\n    background: var(--green-soft);\n    box-shadow: 0 0 0 1px var(--green);\n  }\n  .opt.selected .letter {\n    background: var(--green-btn);\n    border-color: var(--green-btn);\n    color: #fff;\n  }\n\n  /* ── Footer bar with Next ── */\n  .footer {\n    position: fixed;\n    left: 0; right: 0; bottom: 0;\n    background: rgba(255,255,255,0.86);\n    backdrop-filter: blur(20px) saturate(180%);\n    -webkit-backdrop-filter: blur(20px) saturate(180%);\n    border-top: 1px solid var(--mid);\n    padding: 16px clamp(20px, 5vw, 48px);\n  }\n  .footer-inner {\n    max-width: 680px;\n    margin: 0 auto;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n  }\n  .footer-hint {\n    font-size: 13px;\n    color: var(--ink-muted);\n  }\n  .next {\n    appearance: none;\n    border: none;\n    font-family: var(--font-display);\n    font-size: 16px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n    color: #fff;\n    background: var(--green-btn);\n    padding: 14px 34px;\n    border-radius: 100px;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 9px;\n    transition: background 200ms var(--ease), transform 200ms var(--ease),\n                box-shadow 200ms var(--ease), opacity 200ms var(--ease);\n    box-shadow: 0 6px 16px rgba(47, 143, 62, 0.26);\n  }\n  .next:not(:disabled):hover { background: var(--green-btn-hi); transform: translateY(-1px); }\n  .next:not(:disabled):active { transform: translateY(0); }\n  .next:focus-visible { outline: 3px solid var(--green); outline-offset: 3px; }\n  .next .arrow { transition: transform 200ms var(--ease); }\n  .next:not(:disabled):hover .arrow { transform: translateX(3px); }\n  .next:disabled {\n    background: var(--mid);\n    color: var(--ink-muted);\n    cursor: not-allowed;\n    box-shadow: none;\n  }\n\n  /* ── Completion state ── */\n  .done-state {\n    display: none;\n    text-align: center;\n    padding-top: clamp(20px, 6vw, 60px);\n  }\n  .done-state.show { display: block; }\n  .done-ring {\n    width: 64px; height: 64px;\n    margin: 0 auto 24px;\n    border-radius: 50%;\n    background: var(--green-soft);\n    border: 2px solid var(--green);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--green-btn);\n    font-size: 30px;\n  }\n  .done-state h2 {\n    font-family: var(--font-display);\n    font-size: clamp(26px, 4vw, 36px);\n    font-weight: 700;\n    letter-spacing: -0.03em;\n  }\n  .done-state p {\n    margin: 14px auto 0;\n    max-width: 26em;\n    font-size: 17px;\n    line-height: 1.6;\n    color: var(--ink-soft);\n  }\n\n  .fade { animation: fade 320ms var(--ease); }\n  @keyframes fade {\n    from { opacity: 0; transform: translateY(8px); }\n    to { opacity: 1; transform: none; }\n  }\n\n  @media (max-width: 480px) {\n    .topbar { padding: 18px 20px; }\n    .footer-hint { display: none; }\n    .next { flex: 1; justify-content: center; }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    .fade { animation: none; }\n    .progress-fill { transition: none; }\n  }\n<\/style>\n<\/head>\n<body>\n  <header class=\"topbar\">\n    <span class=\"mark\" aria-hidden=\"true\"><\/span>\n    <span class=\"brand\">NutriLearn<\/span>\n    <span class=\"tag\">Post-Test<\/span>\n  <\/header>\n\n  <main>\n    <div class=\"quiz\" data-screen-label=\"Post-Test Question\">\n      <div class=\"progress-head\">\n        <span class=\"progress-label\" id=\"progressLabel\">Question 1 of 8<\/span>\n        <span class=\"progress-pct\" id=\"progressPct\">0% complete<\/span>\n      <\/div>\n      <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progressFill\"><\/div><\/div>\n\n      <div id=\"qBlock\">\n        <h1 class=\"question\" id=\"questionText\"><\/h1>\n        <div class=\"options\" id=\"options\" role=\"radiogroup\" aria-label=\"Answer choices\"><\/div>\n      <\/div>\n\n      <div class=\"done-state\" id=\"doneState\">\n        <div class=\"done-ring\" aria-hidden=\"true\">✓<\/div>\n        <h2>Post-test complete<\/h2>\n        <p>Your answers have been recorded. Next you'll see your results and how they compare to your pre-test.<\/p>\n      <\/div>\n    <\/div>\n  <\/main>\n\n  <footer class=\"footer\" id=\"footer\">\n    <div class=\"footer-inner\">\n      <span class=\"footer-hint\" id=\"footerHint\">Select an answer to continue<\/span>\n      <button class=\"next\" id=\"nextBtn\" type=\"button\" disabled>\n        Next\n        <span class=\"arrow\" aria-hidden=\"true\">→<\/span>\n      <\/button>\n    <\/div>\n  <\/footer>\n\n<script>\n  // Correct answers stored internally (index of correct option). NOT shown to learner.\n  const QUESTIONS = [\n    {\n      lo: \"LO1\",\n      q: \"On a nutrition facts label, what does the 'serving size' tell you?\",\n      options: [\n        \"The total amount of food in the entire package\",\n        \"The recommended portion the nutrition information is based on\",\n        \"The maximum amount of food you should eat in one day\",\n        \"The weight of the package before it was opened\"\n      ],\n      correct: 1\n    },\n    {\n      lo: \"LO1\",\n      q: \"Which of the following is listed as a macronutrient on a standard nutrition facts panel?\",\n      options: [\"Vitamin D\", \"Calcium\", \"Total fat\", \"Potassium\"],\n      correct: 2\n    },\n    {\n      lo: \"LO2\",\n      q: \"A serving of canned soup shows 35% DV for sodium. What does this mean?\",\n      options: [\n        \"This serving contains 35 mg of sodium\",\n        \"This serving provides 35% of the sodium a typical adult should consume in a full day on a 2,000-calorie diet\",\n        \"This product is considered high in sodium only if you eat more than one serving\",\n        \"35% DV means this product has less sodium than the average food\"\n      ],\n      correct: 1\n    },\n    {\n      lo: \"LO2\",\n      q: \"The %DV on a nutrition label is calculated based on which of the following reference diets?\",\n      options: [\n        \"A 1,500-calorie diet recommended for weight loss\",\n        \"A 2,500-calorie diet recommended for active adults\",\n        \"A 2,000-calorie diet used as a general reference for average adults\",\n        \"A personalized calorie target set by your doctor\"\n      ],\n      correct: 2\n    },\n    {\n      lo: \"LO3\",\n      q: \"Which of the following claims on a food package is regulated by the FDA with a specific legal definition?\",\n      options: [\n        \"\\u201CGuilt-free snacking\\u201D\",\n        \"\\u201CMade with real ingredients\\u201D\",\n        \"\\u201CLow fat\\u201D\",\n        \"\\u201CClean eating approved\\u201D\"\n      ],\n      correct: 2\n    },\n    {\n      lo: \"LO3\",\n      q: \"A cereal box says \\u201CWholesome goodness in every bowl.\\u201D How should this claim be classified?\",\n      options: [\n        \"An FDA-regulated health claim, because it references a food product's benefit\",\n        \"An FDA-regulated nutrient content claim, because it describes the product's quality\",\n        \"Unregulated marketing language, because it uses vague, subjective wording with no legal definition\",\n        \"A structure/function claim regulated by the FDA, because it implies a health benefit\"\n      ],\n      correct: 2\n    },\n    {\n      lo: \"LO4\",\n      q: \"A granola bar is labeled \\u201CLow Fat\\u201D and \\u201CA Smarter Snack.\\u201D Its nutrition label shows: Total Fat 3g (4% DV), Total Sugars 21g, Added Sugars 18g (36% DV), Sodium 140mg (6% DV). Which of the following is the most accurate evaluation of these claims?\",\n      options: [\n        \"\\u201CLow Fat\\u201D is accurate and FDA-regulated; \\u201CA Smarter Snack\\u201D is also meaningful because the fat content is genuinely low\",\n        \"\\u201CLow Fat\\u201D is an accurate, FDA-regulated claim; however, \\u201CA Smarter Snack\\u201D is unregulated marketing language that ignores the product's high added sugar content\",\n        \"Both claims are unregulated marketing language because the label shows high sugar\",\n        \"Neither claim can be evaluated without knowing the learner's personal dietary needs\"\n      ],\n      correct: 1\n    },\n    {\n      lo: \"LO4\",\n      q: \"A yogurt is marketed as \\u201CHigh in Protein\\u201D and \\u201CSupports a Healthy Lifestyle.\\u201D Its label shows: Protein 12g (24% DV), Total Fat 8g (10% DV), Added Sugars 14g (28% DV). A learner concludes: \\u201CThis yogurt is a healthy choice because it's high in protein.\\u201D What is the strongest critique of this conclusion?\",\n      options: [\n        \"The conclusion is valid because \\u201CHigh in Protein\\u201D is an FDA-regulated claim, meaning it is nutritionally meaningful\",\n        \"The conclusion overlooks that while the protein claim is FDA-regulated, the label also shows 28% DV of added sugars per serving, which complicates the \\u201Chealthy\\u201D judgment\",\n        \"The conclusion is wrong because \\u201CHigh in Protein\\u201D is unregulated marketing language\",\n        \"The conclusion is valid because the fat content is only 10% DV, which is not high\"\n      ],\n      correct: 1\n    }\n  ];\n\n  const LETTERS = [\"A\", \"B\", \"C\", \"D\"];\n  let current = 0;\n  const answers = new Array(QUESTIONS.length).fill(null);\n\n  const questionText = document.getElementById(\"questionText\");\n  const optionsEl = document.getElementById(\"options\");\n  const nextBtn = document.getElementById(\"nextBtn\");\n  const progressLabel = document.getElementById(\"progressLabel\");\n  const progressPct = document.getElementById(\"progressPct\");\n  const progressFill = document.getElementById(\"progressFill\");\n  const footerHint = document.getElementById(\"footerHint\");\n  const qBlock = document.getElementById(\"qBlock\");\n  const doneState = document.getElementById(\"doneState\");\n  const footer = document.getElementById(\"footer\");\n\n  function render() {\n    const item = QUESTIONS[current];\n    progressLabel.textContent = \"Question \" + (current + 1) + \" of \" + QUESTIONS.length;\n    progressPct.textContent = Math.round((current / QUESTIONS.length) * 100) + \"% complete\";\n    progressFill.style.width = (current / QUESTIONS.length) * 100 + \"%\";\n\n    questionText.textContent = item.q;\n    optionsEl.innerHTML = \"\";\n\n    item.options.forEach((opt, i) => {\n      const btn = document.createElement(\"button\");\n      btn.type = \"button\";\n      btn.className = \"opt\" + (answers[current] === i ? \" selected\" : \"\");\n      btn.setAttribute(\"role\", \"radio\");\n      btn.setAttribute(\"aria-checked\", answers[current] === i ? \"true\" : \"false\");\n      btn.innerHTML =\n        '<span class=\"letter\">' + LETTERS[i] + '<\/span>' +\n        '<span class=\"text\"><\/span>';\n      btn.querySelector(\".text\").textContent = opt;\n      btn.addEventListener(\"click\", () => select(i));\n      optionsEl.appendChild(btn);\n    });\n\n    qBlock.classList.remove(\"fade\");\n    void qBlock.offsetWidth;\n    qBlock.classList.add(\"fade\");\n\n    updateNext();\n    nextBtn.firstChild.textContent = (current === QUESTIONS.length - 1) ? \"Finish \" : \"Next \";\n  }\n\n  function select(i) {\n    answers[current] = i;\n    [...optionsEl.children].forEach((c, idx) => {\n      const on = idx === i;\n      c.classList.toggle(\"selected\", on);\n      c.setAttribute(\"aria-checked\", on ? \"true\" : \"false\");\n    });\n    updateNext();\n  }\n\n  function updateNext() {\n    const has = answers[current] !== null;\n    nextBtn.disabled = !has;\n    footerHint.textContent = has ? \"\" : \"Select an answer to continue\";\n  }\n\n  function next() {\n    if (answers[current] === null) return;\n    if (current < QUESTIONS.length - 1) {\n      current++;\n      render();\n      window.scrollTo({ top: 0, behavior: \"auto\" });\n    } else {\n      finish();\n    }\n  }\n\n  function finish() {\n    // Compute score and persist for the results screen.\n    let score = 0;\n    const detail = QUESTIONS.map((item, i) => {\n      const correct = answers[i] === item.correct;\n      if (correct) score++;\n      return { lo: item.lo, selected: answers[i], correct: item.correct, isCorrect: correct };\n    });\n    try {\n      localStorage.setItem(\"nutriPostTest\", JSON.stringify({\n        type: \"posttest\", score, total: QUESTIONS.length, detail, ts: Date.now()\n      }));\n    } catch (e) {}\n\n    progressFill.style.width = \"100%\";\n    progressLabel.textContent = \"Complete\";\n    progressPct.textContent = \"100% complete\";\n    qBlock.style.display = \"none\";\n    footer.style.display = \"none\";\n    doneState.classList.add(\"show\");\n    doneState.classList.add(\"fade\");\n  }\n\n  nextBtn.addEventListener(\"click\", next);\n  render();\n<\/script>\n\n<script>\n(function () {\n  // Pre/Post test bridge: capture answers when the done-state appears,\n  // reveal a Continue button, and report up to the parent router.\n  var WHICH = \"post\";\n  var done = document.getElementById(\"doneState\");\n  if (!done) return;\n\n  var cont = document.createElement(\"button\");\n  cont.type = \"button\";\n  cont.className = \"next\";\n  cont.style.marginTop = \"28px\";\n  cont.style.display = \"none\";\n  cont.innerHTML = 'Continue <span class=\"arrow\" aria-hidden=\"true\">→<\/span>';\n  done.appendChild(cont);\n  cont.addEventListener(\"click\", function () {\n    parent.postMessage({ type: \"advance\" }, \"*\");\n  });\n\n  var obs = new MutationObserver(function () {\n    if (!done.classList.contains(\"show\")) return;\n    obs.disconnect();\n    cont.style.display = \"inline-flex\";\n    try {\n      // QUESTIONS and answers are top-level bindings of the screen's own script.\n      var detail = QUESTIONS.map(function (it, i) {\n        return {\n          lo: it.lo,\n          selected: answers[i],\n          correct: it.correct,\n          isCorrect: answers[i] === it.correct\n        };\n      });\n      var score = detail.filter(function (d) { return d.isCorrect; }).length;\n      parent.postMessage(\n        {\n          type: \"answers\",\n          which: WHICH,\n          answers: answers.slice(),\n          score: score,\n          total: QUESTIONS.length,\n          detail: detail\n        },\n        \"*\"\n      );\n    } catch (err) {\n      parent.postMessage({ type: \"answers\", which: WHICH, error: String(err) }, \"*\");\n    }\n  });\n  obs.observe(done, { attributes: true, attributeFilter: [\"class\"] });\n})();\n\n<\/script>\n<\/body>\n<\/html>\n","results":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>Your Results · Nutrition Labels<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n<link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\" />\n<style>\n  :root {\n    --font: \"Inter\", -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", sans-serif;\n\n    --ink:        #15161a;\n    --ink-soft:   #5b5f66;\n    --ink-muted:  #8a8f97;\n    --divider:    #e6e7ea;\n    --mid:        #f6f7f8;\n\n    --green:        #34a853;\n    --green-deep:   #1e7d3b;\n    --green-hi:     #2f9c4d;\n    --green-soft:   rgba(52, 168, 83, 0.10);\n    --green-line:   rgba(52, 168, 83, 0.40);\n\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n\n  body {\n    font-family: var(--font);\n    color: var(--ink);\n    background: #ffffff;\n    min-height: 100vh; min-height: 100dvh;\n    display: flex; flex-direction: column;\n  }\n\n  /* ── Header ── */\n  .topbar {\n    display: flex; align-items: center; justify-content: space-between; gap: 16px;\n    padding: 20px clamp(20px, 5vw, 56px);\n    border-bottom: 1px solid var(--divider);\n  }\n  .module { display: flex; align-items: center; gap: 12px; }\n  .mark { width: 26px; height: 26px; border-radius: 8px; background: var(--green); flex: none; position: relative; }\n  .mark::after {\n    content: \"\"; position: absolute; inset: 7px 7px auto 7px; height: 3px; border-radius: 2px;\n    background: rgba(255,255,255,0.95); box-shadow: 0 5px 0 rgba(255,255,255,0.75), 0 10px 0 rgba(255,255,255,0.5);\n  }\n  .module .title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }\n  .module .sub { font-size: 12.5px; font-weight: 500; color: var(--ink-muted); }\n  .module .sep { color: var(--divider); }\n\n  .status { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--green-deep); background: var(--green-soft); border: 1px solid var(--green-line); padding: 7px 14px; border-radius: 100px; }\n  .status .c { width: 16px; height: 16px; border-radius: 50%; background: var(--green-deep); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }\n\n  /* ── Main ── */\n  main {\n    flex: 1;\n    padding: clamp(34px, 5vw, 60px) clamp(20px, 5vw, 56px) clamp(48px, 7vw, 72px);\n    display: flex; flex-direction: column; align-items: center;\n  }\n  .wrap { width: 100%; max-width: 660px; }\n\n  /* ── Celebration ── */\n  .celebrate { text-align: center; margin-bottom: clamp(30px, 4.5vw, 44px); }\n  .ring {\n    width: 62px; height: 62px; margin: 0 auto 22px;\n    border-radius: 50%;\n    background: var(--green-soft);\n    border: 2px solid var(--green);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--green-deep); font-size: 28px;\n    animation: pop 560ms var(--ease);\n  }\n  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }\n  .celebrate h1 { font-size: clamp(26px, 3.6vw, 36px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.12; }\n  .celebrate p { margin-top: 12px; font-size: 16.5px; color: var(--ink-soft); line-height: 1.5; }\n\n  /* ── Score cards ── */\n  .scores { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n  .score-card {\n    border: 1.5px solid var(--divider);\n    border-radius: 20px;\n    padding: 24px;\n    background: #fff;\n    text-align: center;\n  }\n  .score-card.post { border-color: var(--green-line); background: var(--green-soft); }\n  .score-card .lab { font-size: 12.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-muted); }\n  .score-card.post .lab { color: var(--green-deep); }\n  .score-card .num { margin-top: 12px; font-size: clamp(48px, 8vw, 64px); font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }\n  .score-card .num .den { font-size: 0.42em; font-weight: 600; color: var(--ink-muted); letter-spacing: -0.01em; }\n  .score-card.post .num { color: var(--green-deep); }\n  .score-card .pct { margin-top: 8px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); }\n\n  .delta { margin: 18px auto 0; display: flex; justify-content: center; }\n  .delta .pill { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--green-deep); background: var(--green-soft); border: 1px solid var(--green-line); padding: 9px 18px; border-radius: 100px; }\n  .delta .pill.flat { color: var(--ink-soft); background: var(--mid); border-color: var(--divider); }\n\n  /* ── Bar chart ── */\n  .chart {\n    margin-top: clamp(26px, 4vw, 36px);\n    border: 1.5px solid var(--divider);\n    border-radius: 20px;\n    padding: 24px 26px;\n  }\n  .chart .c-title { font-size: 13px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 20px; }\n  .bar-row { display: flex; align-items: center; gap: 16px; }\n  .bar-row + .bar-row { margin-top: 16px; }\n  .bar-row .name { width: 78px; flex: none; font-size: 14px; font-weight: 600; color: var(--ink-soft); }\n  .bar-track { position: relative; flex: 1; height: 38px; background: var(--mid); border-radius: 10px; overflow: hidden; }\n  .bar-fill {\n    position: absolute; inset: 0 auto 0 0; width: 0%;\n    border-radius: 10px;\n    display: flex; align-items: center; justify-content: flex-end;\n    transition: width 900ms var(--ease);\n  }\n  .bar-fill.pre { background: #c9cdd2; }\n  .bar-fill.post { background: linear-gradient(90deg, #34a853, #1e7d3b); }\n  .bar-fill .v { font-size: 14px; font-weight: 700; color: #fff; padding-right: 12px; opacity: 0; transition: opacity 300ms var(--ease) 500ms; white-space: nowrap; }\n  .bar-fill.pre .v { color: #4a4e54; }\n  .bar-fill.show .v { opacity: 1; }\n  .chart .axis { display: flex; justify-content: space-between; margin-top: 10px; padding-left: 94px; font-size: 11.5px; color: var(--ink-muted); }\n\n  /* ── Actions ── */\n  .actions { margin-top: clamp(26px, 4vw, 34px); display: flex; flex-direction: column; align-items: center; gap: 10px; }\n  .btn {\n    appearance: none; border: none;\n    font-family: var(--font); font-size: 16px; font-weight: 600; letter-spacing: -0.01em;\n    color: #fff; background: var(--green-deep);\n    padding: 15px 30px; border-radius: 100px; cursor: pointer;\n    display: inline-flex; align-items: center; gap: 10px;\n    transition: background 200ms var(--ease), transform 200ms var(--ease);\n    box-shadow: 0 6px 18px rgba(30,125,59,0.26);\n  }\n  .btn:hover { background: var(--green-hi); transform: translateY(-1px); }\n  .btn:focus-visible { outline: 3px solid var(--green); outline-offset: 3px; }\n  .btn svg { width: 17px; height: 17px; }\n  .btn .saved { display: none; }\n  .btn.done .label { display: none; }\n  .btn.done .saved { display: inline; }\n  .filehint { font-size: 12.5px; color: var(--ink-muted); }\n\n  /* ── Footer note ── */\n  .thanks { margin-top: clamp(34px, 5vw, 48px); text-align: center; font-size: 14.5px; color: var(--ink-muted); line-height: 1.6; padding-top: clamp(22px, 3.5vw, 30px); border-top: 1px solid var(--divider); }\n  .thanks b { color: var(--ink-soft); font-weight: 600; }\n\n  @media (max-width: 540px) {\n    .module .sub, .module .sep { display: none; }\n    .scores { grid-template-columns: 1fr; }\n    .bar-row .name { width: 64px; }\n    .chart .axis { padding-left: 80px; }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .ring { animation: none; }\n    .bar-fill { transition: width 250ms; }\n  }\n<\/style>\n<\/head>\n<body>\n  <header class=\"topbar\">\n    <div class=\"module\">\n      <span class=\"mark\" aria-hidden=\"true\"><\/span>\n      <span class=\"title\">Nutrition Labels<\/span>\n      <span class=\"sep\">·<\/span>\n      <span class=\"sub\">Module 6 — Results<\/span>\n    <\/div>\n    <span class=\"status\"><span class=\"c\" aria-hidden=\"true\">✓<\/span> Module complete<\/span>\n  <\/header>\n\n  <main>\n    <div class=\"wrap\" data-screen-label=\"Results\">\n      <div class=\"celebrate\">\n        <div class=\"ring\" aria-hidden=\"true\">✓<\/div>\n        <h1>You've completed the module.<\/h1>\n        <p>Here's how your understanding of nutrition labels grew.<\/p>\n      <\/div>\n\n      <!-- Score cards -->\n      <div class=\"scores\">\n        <div class=\"score-card pre\">\n          <div class=\"lab\">Pre-Test Score<\/div>\n          <div class=\"num\"><span id=\"preNum\">0<\/span><span class=\"den\"> / 8<\/span><\/div>\n          <div class=\"pct\" id=\"prePct\">0% correct<\/div>\n        <\/div>\n        <div class=\"score-card post\">\n          <div class=\"lab\">Post-Test Score<\/div>\n          <div class=\"num\"><span id=\"postNum\">0<\/span><span class=\"den\"> / 8<\/span><\/div>\n          <div class=\"pct\" id=\"postPct\">0% correct<\/div>\n        <\/div>\n      <\/div>\n\n      <div class=\"delta\">\n        <span class=\"pill\" id=\"deltaPill\">— <\/span>\n      <\/div>\n\n      <!-- Bar chart -->\n      <div class=\"chart\">\n        <div class=\"c-title\">Pre-test vs. post-test<\/div>\n        <div class=\"bar-row\">\n          <span class=\"name\">Pre-Test<\/span>\n          <div class=\"bar-track\"><div class=\"bar-fill pre\" id=\"barPre\"><span class=\"v\" id=\"barPreV\">0<\/span><\/div><\/div>\n        <\/div>\n        <div class=\"bar-row\">\n          <span class=\"name\">Post-Test<\/span>\n          <div class=\"bar-track\"><div class=\"bar-fill post\" id=\"barPost\"><span class=\"v\" id=\"barPostV\">0<\/span><\/div><\/div>\n        <\/div>\n        <div class=\"axis\"><span>0<\/span><span>2<\/span><span>4<\/span><span>6<\/span><span>8<\/span><\/div>\n      <\/div>\n\n      <!-- Download -->\n      <div class=\"actions\">\n        <button class=\"btn\" id=\"csvBtn\" type=\"button\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3v12\"/><path d=\"m7 11 5 5 5-5\"/><path d=\"M5 21h14\"/><\/svg>\n          <span class=\"label\">Download Results (CSV)<\/span>\n          <span class=\"saved\">Downloaded ✓<\/span>\n        <\/button>\n        <span class=\"filehint\" id=\"fileHint\">Exports your pre- and post-test answers and scores.<\/span>\n      <\/div>\n\n      <p class=\"thanks\">Thank you for participating. <b>Your responses have been recorded.<\/b><\/p>\n    <\/div>\n  <\/main>\n\n<script>\nwindow.__RESULTS_DATA__ = \"__RESULTS_DATA_PLACEHOLDER__\";\n(function () {\n  var TOTAL = 8;\n  var LETTERS = [\"A\", \"B\", \"C\", \"D\"];\n  var DATA = window.__RESULTS_DATA__ || {};\n  var pre = DATA.pre, post = DATA.post;\n  var usingDemo = !pre || !post;\n\n  function demoDetail(flags) {\n    return flags.map(function (f, i) {\n      return { lo: \"LO\" + (Math.floor(i / 2) + 1), selected: f ? 1 : 0, correct: 1, isCorrect: !!f };\n    });\n  }\n  if (!pre) pre = { score: 3, total: TOTAL, answers: [1, 0, 1, 0, 0, 1, 0, 0], detail: demoDetail([1, 0, 1, 0, 0, 1, 0, 0]) };\n  if (!post) post = { score: 7, total: TOTAL, answers: [1, 1, 1, 1, 1, 0, 1, 1], detail: demoDetail([1, 1, 1, 1, 1, 0, 1, 1]) };\n\n  var preScore = pre.score != null ? pre.score : 0;\n  var postScore = post.score != null ? post.score : 0;\n  function pct(s) { return Math.round((s / TOTAL) * 100); }\n\n  document.getElementById(\"preNum\").textContent = preScore;\n  document.getElementById(\"postNum\").textContent = postScore;\n  document.getElementById(\"prePct\").textContent = pct(preScore) + \"% correct\";\n  document.getElementById(\"postPct\").textContent = pct(postScore) + \"% correct\";\n\n  var diff = postScore - preScore;\n  var deltaPill = document.getElementById(\"deltaPill\");\n  if (diff > 0) {\n    deltaPill.textContent = \"▲ +\" + diff + \" point\" + (diff === 1 ? \"\" : \"s\") + \" improvement\";\n  } else if (diff === 0) {\n    deltaPill.textContent = \"No change from pre-test\";\n    deltaPill.classList.add(\"flat\");\n  } else {\n    deltaPill.textContent = diff + \" point\" + (diff === -1 ? \"\" : \"s\") + \" vs. pre-test\";\n    deltaPill.classList.add(\"flat\");\n  }\n\n  function setBar(fillId, vId, score) {\n    var fill = document.getElementById(fillId), v = document.getElementById(vId);\n    v.textContent = score + \" / 8\";\n    requestAnimationFrame(function () {\n      setTimeout(function () {\n        fill.style.width = Math.max((score / TOTAL) * 100, 9) + \"%\";\n        fill.classList.add(\"show\");\n      }, 180);\n    });\n  }\n  setBar(\"barPre\", \"barPreV\", preScore);\n  setBar(\"barPost\", \"barPostV\", postScore);\n\n  if (usingDemo) {\n    document.getElementById(\"fileHint\").textContent = \"Showing sample scores — complete both tests to record your own.\";\n  }\n\n  // ── CSV: one row per learner ──\n  function letter(i) { return i == null ? \"\" : LETTERS[i] || String(i); }\n  function ans(obj, i) {\n    if (obj && obj.answers && obj.answers[i] != null) return obj.answers[i];\n    if (obj && obj.detail && obj.detail[i]) return obj.detail[i].selected;\n    return null;\n  }\n  function csvCell(s) {\n    s = String(s == null ? \"\" : s);\n    return /[\",\\n]/.test(s) ? '\"' + s.replace(/\"/g, '\"\"') + '\"' : s;\n  }\n  function buildCSV() {\n    var header = [], row = [];\n    for (var i = 0; i < TOTAL; i++) { header.push(\"Pre_Q\" + (i + 1)); row.push(letter(ans(pre, i))); }\n    for (var j = 0; j < TOTAL; j++) { header.push(\"Post_Q\" + (j + 1)); row.push(letter(ans(post, j))); }\n    header.push(\"PreTestScore\", \"PostTestScore\", \"Timestamp\");\n    row.push(preScore, postScore, new Date().toISOString());\n    return header.map(csvCell).join(\",\") + \"\\r\\n\" + row.map(csvCell).join(\",\") + \"\\r\\n\";\n  }\n\n  document.getElementById(\"csvBtn\").addEventListener(\"click\", function () {\n    var csv = buildCSV();\n    var blob = new Blob([csv], { type: \"text/csv;charset=utf-8;\" });\n    var url = URL.createObjectURL(blob);\n    var a = document.createElement(\"a\");\n    a.href = url;\n    a.download = \"nutrition-labels-results.csv\";\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);\n    var btn = document.getElementById(\"csvBtn\");\n    btn.classList.add(\"done\");\n    setTimeout(function () { btn.classList.remove(\"done\"); }, 2600);\n  });\n})();\n\n<\/script>\n\n<\/body>\n<\/html>\n"};
  var ORDER = ["landing","pretest","hook","interactive","dragdrop","step","mcq","flip","sorting","posttest","results"];
  var idx = 0;
  // In-memory store of the learner's answers (no server, no localStorage needed).
  var store = { pre: null, post: null };
  var frame = document.getElementById("screen");

  function buildDoc(key) {
    var html = DOCS[key];
    if (key === "results") {
      var payload = { pre: store.pre, post: store.post };
      html = html.replace('"__RESULTS_DATA_PLACEHOLDER__"', function () { return JSON.stringify(payload); });
    }
    return html;
  }
  function show(i) { idx = i; frame.srcdoc = buildDoc(ORDER[i]); }
  function next() { if (idx < ORDER.length - 1) show(idx + 1); }

  window.addEventListener("message", function (e) {
    var m = e.data || {};
    if (m.type === "advance") {
      next();
    } else if (m.type === "answers") {
      if (m.which === "pre") store.pre = m;
      else if (m.which === "post") store.post = m;
    }
  });

  show(0);
})();
